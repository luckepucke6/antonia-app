<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />

  <!-- viewport-fit=cover krävs för att env(safe-area-inset-*) ska fungera på iPhone -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />

  <title>Antonias dagbok &lt;3</title>

  <!-- PWA-manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#FAF4F2" />

  <!-- iOS: gör att appen körs i helskärm (standalone) från hemskärmen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Antonias dagbok" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <style>
    /* ========================================================================
       PALETT & GRUNDER  ("Dimrosa & grädde")
       ===================================================================== */
    :root {
      --bg: #FAF4F2;        /* sidbakgrund (cream rose) */
      --card: #FFFFFF;      /* kort/paneler */
      --accent: #C68A95;    /* dusty rose – aktiv flik, knappar */
      --accent-soft: #F3E6E8; /* mjuk accent-bakgrund */
      --text: #463A3D;      /* huvudtext (plum brown) */
      --muted: #A8979B;     /* dämpad text (mauve gray) */
      --line: #EFE6E3;      /* tunna avgränsare */

      --tabbar-height: 58px;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;

      /* Lämna plats för den fasta flik-raden + iPhones hemknapps-streck */
      padding-bottom: calc(var(--tabbar-height) + env(safe-area-inset-bottom));
    }

    /* ========================================================================
       TOPPRUBRIK (per vy)
       ===================================================================== */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--bg);
      /* Skjut ner innehållet under iPhones notch/statusrad */
      padding: calc(env(safe-area-inset-top) + 14px) 20px 12px;
      border-bottom: 1px solid var(--line);
    }
    .app-header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 650;
      letter-spacing: -0.01em;
    }

    /* ========================================================================
       VYER
       ===================================================================== */
    main { padding: 16px 20px 24px; }

    .view { display: none; }
    .view.active { display: block; animation: fade 0.2s ease; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .placeholder {
      color: var(--muted);
      font-size: 0.98rem;
    }

    /* Enkelt kort som du kan återanvända när vyerna byggs ut */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-top: 14px;
      box-shadow: 0 1px 3px rgba(70, 58, 61, 0.06);
    }

    /* ========================================================================
       KNAPPAR (används i Inställningar)
       ===================================================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.85; }
    .btn.secondary {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .hint {
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ========================================================================
       FLIK-RAD (fast bottom tab bar i iOS-stil)
       ===================================================================== */
    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      background: var(--card);
      border-top: 1px solid var(--line);
      /* Lyft knapparna ovanför hemknapps-strecket */
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: var(--tabbar-height);
      padding: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tab .icon { font-size: 1.2rem; line-height: 1; }
    .tab.active { color: var(--accent); }

    /* ========================================================================
       MÅENDE-VYN
       ===================================================================== */

    /* Datum-navigering högst upp i vyn */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    .date-nav .nav-btn {
      width: 40px;
      height: 40px;
      flex: none;
      font-size: 1.4rem;
      line-height: 1;
      color: var(--accent);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .date-nav .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .date-nav .date-label {
      flex: 1;
      text-align: center;
      font-weight: 650;
      text-transform: capitalize;
    }
    .date-nav .date-badge {
      display: block;
      margin-top: 1px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: none;
    }

    /* Gruppsrubrik (KÄNSLOR / KROPP / SÖMN / ÖVRIGT) */
    .group-title {
      margin: 22px 0 0;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* En skattningsrad */
    .metric { padding: 6px 0; }
    .metric + .metric { border-top: 1px solid var(--line); }
    .metric-label {
      font-size: 0.98rem;
      font-weight: 550;
      margin-bottom: 4px;
    }

    /* Rad med fem emoji-ansikten */
    .faces {
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }
    .face {
      flex: 1;
      min-height: 44px;            /* bekväm träffyta på mobil */
      font-size: 1.7rem;
      line-height: 1;
      background: none;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      /* Oifyllt = dämpat, så det syns tydligt att inget är valt */
      opacity: 0.4;
      filter: grayscale(0.5);
      transform: scale(1);
      transition: opacity 0.18s ease, transform 0.18s ease,
                  background 0.18s ease, filter 0.18s ease;
    }
    .face.selected {
      opacity: 1;
      filter: none;
      transform: scale(1.18);
      background: var(--accent-soft);
    }
    .face:active { transform: scale(0.92); }

    /* Låg/hög-etiketter under skalan */
    .scale-ends {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* Sömntimmar: − [input] + */
    .sleep-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 2px;
    }
    .stepper {
      width: 42px;
      height: 42px;
      flex: none;
      font-size: 1.5rem;
      line-height: 1;
      color: var(--accent);
      background: var(--accent-soft);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .sleep-row input {
      flex: 1;
      width: 100%;
      min-width: 0;
      padding: 11px 12px;
      font-size: 1.05rem;
      text-align: center;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .sleep-row .unit { color: var(--muted); font-size: 0.95rem; }

    /* Fritext */
    .note {
      width: 100%;
      min-height: 84px;
      padding: 12px;
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      resize: vertical;
    }

    /* Sticky spara-rad, ovanför flik-raden + safe-area */
    .save-bar {
      position: sticky;
      bottom: calc(var(--tabbar-height) + env(safe-area-inset-bottom) + 8px);
      margin-top: 18px;
      padding-top: 8px;
    }
    .save-bar .btn { margin-top: 0; box-shadow: 0 4px 16px rgba(198,138,149,0.35); }

    /* Liten bekräftelse-bubbla (återanvändbar) */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--tabbar-height) + env(safe-area-inset-bottom) + 24px);
      transform: translateX(-50%) translateY(8px);
      z-index: 20;
      padding: 11px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: rgba(70, 58, 61, 0.92);
      border-radius: 999px;
      box-shadow: 0 6px 20px rgba(70, 58, 61, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      .face, .toast { transition: none; }
      .view.active { animation: none; }
    }

    /* ========================================================================
       MEDICIN-VYN (escitalopram i omgångar)
       Två tydligt åtskilda tillstånd: PÅGÅENDE omgång vs INGEN omgång.
       ===================================================================== */

    /* Morgon-påminnelse: visas bara under pågående omgång om idag inte bockats.
       (Fallback för iOS, där schemalagda bakgrundsnotiser inte går att lita på.) */
    .med-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(198, 138, 149, 0.35);
    }
    .med-banner .banner-icon { font-size: 1.5rem; line-height: 1; }
    .med-banner .banner-text { flex: 1; font-weight: 600; font-size: 0.96rem; }
    .med-banner .banner-btn {
      flex: none;
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
      background: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* STATUS-kort – PÅGÅENDE omgång: varm accent-bakgrund + accent-kant. */
    .status-card.active {
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      box-shadow: 0 1px 3px rgba(198, 138, 149, 0.18);
    }
    /* STATUS-kort – INGEN omgång: lugnt neutralt vitt kort. */
    .status-card.idle { text-align: center; }

    .status-eyebrow {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .status-card.idle .status-eyebrow { color: var(--muted); }

    /* Stort "Dag X"-tal för pågående omgång */
    .day-counter {
      margin: 6px 0 2px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .status-sub { font-size: 0.9rem; color: var(--muted); }

    /* Liten "✓ Tagen idag"-markering */
    .taken-today {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 5px 12px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #3f7a5a;
      background: #e4f1e8;
      border-radius: 999px;
    }

    /* Dos-väljare (snabbval 5/10/15/20 mg), radio-liknande knapprad */
    .dose-group {
      display: flex;
      gap: 8px;
      margin: 12px 0 4px;
    }
    .dose-opt {
      flex: 1;
      min-height: 44px;
      padding: 8px 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dose-opt.selected {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }
    .dose-label {
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--muted);
    }

    /* Stora primärknappen "Jag tog den idag" */
    .btn.big { padding: 17px 16px; font-size: 1.08rem; }
    .btn:disabled { opacity: 0.55; cursor: default; }

    /* Rad för att logga en glömd dag bakåt i tiden */
    .backdate-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .backdate-row input[type="date"] {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .backdate-row .btn { margin-top: 0; width: auto; flex: none; padding: 10px 16px; }

    /* Statistik-rader (när ingen omgång pågår) */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 9px 0;
    }
    .stat-row + .stat-row { border-top: 1px solid var(--line); }
    .stat-row .stat-val { font-weight: 700; font-size: 1.05rem; }
    .stat-lead {
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      margin: 2px 0 4px;
    }

    /* HISTORIK – tidslinje över omgångar */
    .course-item {
      padding: 12px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .course-item + .course-item { border-top: 1px solid var(--line); }
    .course-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .course-dates { font-weight: 600; font-size: 0.96rem; }
    .course-days { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
    .course-tag {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    /* Liten visuell stapel vars bredd speglar antal dagar */
    .course-bar {
      height: 6px;
      margin-top: 7px;
      background: var(--accent-soft);
      border-radius: 999px;
      overflow: hidden;
    }
    .course-bar > span {
      display: block;
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
    }

    /* Utfälld lista med en omgångs loggade dagar */
    .course-days-list { margin-top: 10px; }
    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 0;
      font-size: 0.92rem;
    }
    .day-row + .day-row { border-top: 1px solid var(--line); }
    .day-del {
      flex: none;
      padding: 5px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .empty-hint {
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
      padding: 6px 0;
    }

    /* ========================================================================
       BLÖDNINGAR-VYN (mellanblödningar + framsläppt mens)
       Återanvänder mycket från Medicin/Mående: .dose-group/.dose-opt för typ &
       flöde, .faces/.face för mående, .course-item/.stat-row för historik/stats.
       ===================================================================== */

    /* Fällbart formulär – dolt tills man trycker "Logga blödning". */
    .bleed-form { display: none; }
    .bleed-form.open { display: block; }

    /* Liten etikett ovanför varje fält i formuläret. */
    .field-label {
      margin: 16px 0 0;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field-label:first-child { margin-top: 0; }

    /* Datumväljaren – samma stil som backdate-fältet i Medicin. */
    .bleed-form input[type="date"] {
      width: 100%;
      margin-top: 8px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    /* Spara/Avbryt sida vid sida. */
    .bleed-actions { display: flex; gap: 8px; margin-top: 18px; }
    .bleed-actions .btn { margin-top: 0; }

    /* Liten typ-tagg i historiken (varm för mens, dämpad för mellanblödning). */
    .bleed-tag {
      display: inline-block;
      margin-left: 8px;
      padding: 1px 8px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 999px;
    }
    .bleed-tag.mellan  { color: var(--muted);  background: var(--accent-soft); }
    .bleed-tag.mens    { color: #fff;          background: var(--accent); }
    .bleed-tag.blandat { color: var(--accent); background: var(--accent-soft); }

    /* Detaljrad i en utfälld händelse: datum + flöde/mående + redigera/ta bort. */
    .bleed-day { padding: 9px 0; }
    .bleed-day + .bleed-day { border-top: 1px solid var(--line); }
    .bleed-day-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .bleed-day-date { font-weight: 600; font-size: 0.94rem; }
    .bleed-day-meta { margin-top: 2px; font-size: 0.86rem; color: var(--muted); }
    .bleed-day-note {
      margin-top: 4px;
      font-size: 0.9rem;
      color: var(--text);
      white-space: pre-wrap;
    }
    .bleed-day-btns { display: flex; gap: 6px; flex: none; }
    .bleed-day-btns .day-del { background: var(--accent-soft); }

    /* ========================================================================
       IDAG-VYN (lugn daglig översikt)
       ===================================================================== */

    /* Varm hälsning + datum högst upp. */
    .greeting {
      margin-top: 4px;
      font-size: 1.35rem;
      font-weight: 650;
      letter-spacing: -0.01em;
    }
    .greeting-date {
      margin-top: 2px;
      font-size: 0.95rem;
      color: var(--muted);
      text-transform: capitalize;
    }

    /* Sammanfattnings-chips i måendekortet (emoji + etikett). */
    .summary-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      background: var(--accent-soft);
      border-radius: 999px;
    }

    /* Klickbar rad-kort (blödningsöversikten → öppnar Blödningar-vyn). */
    .card-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      margin-top: 14px;
      padding: 16px 18px;
      font-size: 0.98rem;
      font-weight: 550;
      text-align: left;
      color: var(--text);
      background: var(--card);
      border: none;
      border-radius: var(--radius);
      box-shadow: 0 1px 3px rgba(70, 58, 61, 0.06);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-link:active { opacity: 0.85; }
    .card-link-arrow { flex: none; font-size: 1.3rem; color: var(--accent); }

    /* "Omgång pågår – dag X" – framträdande men inte gigantisk. */
    .idag-med-head {
      margin: 6px 0 2px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
  </style>
</head>

<body>
  <!-- =======================================================================
       RUBRIK – uppdateras när man byter vy
       ==================================================================== -->
  <header class="app-header">
    <h1 id="view-title">Idag</h1>
  </header>

  <!-- =======================================================================
       VYER  (bara rubrik + platshållare i detta steg)
       ==================================================================== -->
  <main>
    <!-- 1. Översikt – allt innehåll renderas av JS (sektion h). -->
    <section id="view-idag" class="view active">
      <div id="idag-content"></div>
    </section>

    <!-- 2. Daglig måendecheck -->
    <section id="view-maende" class="view">
      <!-- Datum för check-in:en (default idag, går att bläddra bakåt) -->
      <div class="date-nav">
        <button class="nav-btn" id="mood-prev" aria-label="Föregående dag">‹</button>
        <div class="date-label">
          <span id="mood-date-text">–</span>
          <span class="date-badge" id="mood-date-badge"></span>
        </div>
        <button class="nav-btn" id="mood-next" aria-label="Nästa dag">›</button>
      </div>

      <!-- KÄNSLOR – skattningsraderna genereras av JS -->
      <div class="card">
        <p class="group-title" style="margin-top:0;">Känslor</p>
        <div id="metrics-kanslor"></div>
      </div>

      <!-- KROPP -->
      <div class="card">
        <p class="group-title" style="margin-top:0;">Kropp</p>
        <div id="metrics-kropp"></div>
      </div>

      <!-- SÖMN: antal timmar (stegare/inmatning) + sömnkvalitet -->
      <div class="card">
        <p class="group-title" style="margin-top:0;">Sömn</p>
        <div class="metric">

          <div class="sleep-row">
            <button class="stepper" id="sleep-minus" aria-label="Minska">−</button>

      <!-- ÖVRIGT: valfri fritext -->
      <div class="card">

                  placeholder="Valfritt – triggers, tankar, mat som påverkat magen …"></textarea>

    <section id="view-medicin" class="view">

         (sektion g) in i #bleeding-content. -->
    <section id="view-blodningar" class="view">
      <!-- Öppnar formuläret för dagens (eller en bakåtdaterad) blödning. -->
      <button class="btn" id="btn-bleed-today">🩸 Logga blödning idag</button>

      <!-- Fällbart formulär (dolt tills man trycker på knappen ovan). -->
      <div class="card bleed-form" id="bleed-form">
        <p class="field-label">Datum</p>
        <!-- max sätts till idag av JS; ingen loggning i framtiden. -->
        <input type="date" id="bleed-date" />

        <p class="field-label">Typ</p>
        <div class="dose-group" id="bleed-type"></div>

        <p class="field-label">Flöde</p>
        <div class="dose-group" id="bleed-flow"></div>

        <p class="field-label">Mående under blödningen (valfritt)</p>
        <div class="faces" id="bleed-mood"></div>
        <div class="scale-ends"><span>dåligt</span><span>bra</span></div>

        <p class="field-label">Anteckning (valfritt)</p>
        <textarea class="note" id="bleed-note"
                  placeholder="Valfritt – t.ex. kramper, hur det känns …"></textarea>

        <div class="bleed-actions">
          <button class="btn secondary" id="btn-bleed-cancel">Avbryt</button>
          <button class="btn" id="btn-bleed-save">Spara</button>
        </div>

      <!-- Statistik + historik (tidslinje över händelser) renderas hit. -->
      <div id="bleeding-content"></div>
    </section>

    <!-- 5. Inställningar – export/import av all data -->
    <section id="view-installningar" class="view">
      <div class="card">
        <strong>Säkerhetskopiering</strong>
        <p class="hint" style="margin-top:6px;">
          All data finns bara på den här telefonen. Exportera regelbundet så att
          du kan flytta över allt om du byter telefon.
        </p>
        <button class="btn" id="btn-export">⬇️ Exportera all data (JSON)</button>
        <button class="btn secondary" id="btn-import">⬆️ Importera från fil</button>
        <input type="file" id="import-file" accept="application/json,.json" hidden />
        <p class="hint" id="settings-status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <!-- Liten bekräftelse-bubbla (delas av alla vyer) -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- =======================================================================
       FLIK-RAD
       ==================================================================== -->
  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-view="idag" data-title="Idag">
      <span class="icon">🏠</span><span>Idag</span>
    </button>
    <button class="tab" data-view="maende" data-title="Mående">
      <span class="icon">🌤️</span><span>Mående</span>
    </button>
    <button class="tab" data-view="medicin" data-title="Medicin">
      <span class="icon">💊</span><span>Medicin</span>
    </button>
    <button class="tab" data-view="blodningar" data-title="Blödningar">
      <span class="icon">🩸</span><span>Blödningar</span>
    </button>
    <button class="tab" data-view="installningar" data-title="Inställningar">
      <span class="icon">⚙️</span><span>Inställn.</span>
    </button>
  </nav>

  <script>
    "use strict";

    /* ======================================================================
       a) NAVIGERING mellan vyer
       =================================================================== */
    const tabbar = document.getElementById("tabbar");
    const viewTitle = document.getElementById("view-title");

    function showView(name, title) {
      // Visa rätt sektion
      document.querySelectorAll(".view").forEach((v) => {
        v.classList.toggle("active", v.id === "view-" + name);
      });
      // Markera rätt flik
      document.querySelectorAll(".tab").forEach((t) => {
        t.classList.toggle("active", t.dataset.view === name);
      });
      // Uppdatera rubriken
      viewTitle.textContent = title;
      // Skrolla upp så ny vy börjar i toppen
      window.scrollTo(0, 0);
      // Idag-, Medicin- och Blödningsvyn byggs om från databasen varje visning.
      if (name === "idag") renderIdag();
      if (name === "medicin") renderMedicin();
      if (name === "blodningar") renderBleeding();
    }

    tabbar.addEventListener("click", (e) => {
      const tab = e.target.closest(".tab");
      if (!tab) return;
      showView(tab.dataset.view, tab.dataset.title);
    });

    /* ======================================================================
       b) INDEXEDDB – liten hjälpmodul
          Object stores:
            mood        – nyckel = datum (YYYY-MM-DD), en post per dag
            medication  – auto-id, en post per loggad dag:
                          { id, date, omgangId, dos }
            bleeding    – auto-id, fält t.ex. { date, type, flow, mood }
            courses     – nyckel = omgangId, en post per medicin-omgång (kur):
                          { omgangId, startdatum, slutdatum, active }
       =================================================================== */
    const DB_NAME = "antonia-dagbok";
    // v2: lade till "courses"-store för escitalopram-omgångar.
    const DB_VERSION = 2;
    const STORES = ["mood", "medication", "bleeding", "courses"];

    let _dbPromise = null;

    // Öppnar (och vid behov skapar) databasen. Cachar löftet.
    function openDB() {
      if (_dbPromise) return _dbPromise;
      _dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          // mood: datum som nyckel → enkel upsert per dag
          if (!db.objectStoreNames.contains("mood")) {
            db.createObjectStore("mood", { keyPath: "date" });
          }
          // medication & bleeding: löpande id (flera poster per dag möjliga)
          if (!db.objectStoreNames.contains("medication")) {
            db.createObjectStore("medication", { keyPath: "id", autoIncrement: true });
          }
          if (!db.objectStoreNames.contains("bleeding")) {
            db.createObjectStore("bleeding", { keyPath: "id", autoIncrement: true });
          }
          // courses: en post per medicin-omgång, omgangId som nyckel (upsert).
          if (!db.objectStoreNames.contains("courses")) {
            db.createObjectStore("courses", { keyPath: "omgangId" });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return _dbPromise;
    }

    // Liten hjälpare: kör en transaktion och returnera ett löfte på request-resultatet.
    async function _tx(store, mode, fn) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(store, mode);
        const req = fn(tx.objectStore(store));
        tx.oncomplete = () => resolve(req ? req.result : undefined);
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    }

    // Lägg till / uppdatera en post (put = upsert).
    function addRecord(store, obj) {
      return _tx(store, "readwrite", (os) => os.put(obj));
    }

    // Hämta en post via nyckel.
    function getRecord(store, key) {
      return _tx(store, "readonly", (os) => os.get(key));
    }

    // Hämta alla poster i en store.
    function getAll(store) {
      return _tx(store, "readonly", (os) => os.getAll());
    }

    // Töm en store (används vid import/återställning).
    function clearStore(store) {
      return _tx(store, "readwrite", (os) => os.clear());
    }

    // Ta bort en enskild post via nyckel (t.ex. en felregistrerad medicin-dag).
    function deleteRecord(store, key) {
      return _tx(store, "readwrite", (os) => os.delete(key));
    }

    // Gör hjälparna nåbara i konsolen så du lätt kan testa medan du bygger.
    window.db = { openDB, addRecord, getRecord, getAll, clearStore, deleteRecord, STORES };

    /* ======================================================================
       c) EXPORT / IMPORT av all data (Inställningar)
       =================================================================== */
    const statusEl = document.getElementById("settings-status");

    function setStatus(msg) { statusEl.textContent = msg; }

    function todayISO() {
      return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    }

    // Exportera alla stores till en nedladdningsbar JSON-fil.
    async function exportData() {
      try {
        const data = {
          app: "antonia-dagbok",
          version: DB_VERSION,
          exportedAt: new Date().toISOString(),
        };
        for (const store of STORES) {
          data[store] = await getAll(store);
        }

        const blob = new Blob([JSON.stringify(data, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "antonias-dagbok-backup-" + todayISO() + ".json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus("Export klar – kontrollera din nedladdningsmapp.");
      } catch (err) {
        console.error(err);
        setStatus("Något gick fel vid export: " + err.message);
      }
    }

    // Importera en tidigare exporterad JSON-fil (ersätter befintlig data).
    async function importData(file) {
      try {
        const text = await file.text();
        const data = JSON.parse(text);

        // Enkel validering – filen måste innehålla våra stores.
        const hasStores = STORES.some((s) => Array.isArray(data[s]));
        if (!hasStores) {
          setStatus("Filen ser inte ut att vara en giltig backup.");
          return;
        }

        const ok = confirm(
          "Detta ersätter all nuvarande data med innehållet i filen. Fortsätta?"
        );
        if (!ok) {
          setStatus("Import avbruten.");
          return;
        }

        // Töm och fyll varje store.
        for (const store of STORES) {
          await clearStore(store);
          const records = Array.isArray(data[store]) ? data[store] : [];
          for (const rec of records) {
            await addRecord(store, rec);
          }
        }

        setStatus("Import klar – all data återställd.");
      } catch (err) {
        console.error(err);
        setStatus("Något gick fel vid import: " + err.message);
      }
    }

    document.getElementById("btn-export")
      .addEventListener("click", exportData);

    const importInput = document.getElementById("import-file");
    document.getElementById("btn-import")
      .addEventListener("click", () => importInput.click());
    importInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) importData(file);
      importInput.value = ""; // tillåt att samma fil väljs igen
    });

    /* ======================================================================
       e) MÅENDEVY – daglig check-in
          En post/dag i "mood" (nyckel = datum). Värdena 1–5 representeras av
          emoji-ansikten; oifyllt sparas inte. Sömntimmar + fritext är fria fält.
       =================================================================== */

    // Två emoji-skalor beroende på metrikens riktning:
    //   valence   – högt = bra  (😢 … 😄)
    //   intensity – högt = mer/sämre (😌 lugn … 😣 överväldigad)
    // Höger ansikte betyder alltid "mer/intensivare" och matchar etiketten.
    const EMOJI = {
      valence:   ["😢", "😕", "😐", "🙂", "😄"],
      intensity: ["😌", "🙂", "😐", "😟", "😣"],
    };

    // Konfiguration som driver renderingen av alla skattningsrader.
    // group bestämmer vilken container raden hamnar i.
    const MOOD_METRICS = [
      // KÄNSLOR
      { id: "humor",         group: "kanslor", label: "Humör",                 scale: "valence",   low: "dåligt", high: "bra" },
      { id: "irritabilitet", group: "kanslor", label: "Irritabilitet",         scale: "intensity", low: "lite",   high: "mycket" },
      { id: "angest",        group: "kanslor", label: "Ångest / oro",          scale: "intensity", low: "lite",   high: "mycket" },
      { id: "kanslighet",    group: "kanslor", label: "Känslighet",            scale: "intensity", low: "lite",   high: "mycket" },
      { id: "intensitet",    group: "kanslor", label: "Intensitet på känslor", scale: "intensity", low: "lite",   high: "mycket" },
      { id: "delusion",      group: "kanslor", label: "Grad av delusion",      scale: "intensity", low: "ingen",  high: "stark" },
      // KROPP
      { id: "energi",        group: "kropp",   label: "Energi",                scale: "valence",   low: "lågt",   high: "högt" },
      { id: "magbesvar",     group: "kropp",   label: "Magbesvär (IBS/PCOS)",  scale: "intensity", low: "inga",   high: "mycket" },
      { id: "stress",        group: "kropp",   label: "Stress / kortisol",     scale: "intensity", low: "lite",   high: "mycket" },
      // SÖMN (kvalitet; antal timmar hanteras separat)
      { id: "sleepQuality",  group: "somn",    label: "Hur du sov",            scale: "valence",   low: "dåligt", high: "bra" },
    ];

    // --- State för den dag som visas ---
    let moodDate = todayISO();   // YYYY-MM-DD
    let selections = {};         // { metrikId: 1..5 } – bara ifyllda

    // Lägg till n dagar på en YYYY-MM-DD-sträng och returnera ny sträng.
    function shiftDate(iso, days) {
      const d = new Date(iso + "T00:00:00");
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    // Bygg alla skattningsrader en gång och lägg i rätt grupp-container.
    function buildMetricRows() {
      const containers = {
        kanslor: document.getElementById("metrics-kanslor"),
        kropp:   document.getElementById("metrics-kropp"),
        somn:    document.getElementById("metrics-somn"),
      };

      MOOD_METRICS.forEach((m) => {
        const faces = EMOJI[m.scale]
          .map((emoji, i) =>
            `<button class="face" type="button" data-id="${m.id}" ` +
            `data-value="${i + 1}" aria-label="${i + 1} av 5">${emoji}</button>`)
          .join("");

        const row = document.createElement("div");
        row.className = "metric";
        row.innerHTML =
          `<div class="metric-label">${m.label}</div>` +
          `<div class="faces">${faces}</div>` +
          `<div class="scale-ends"><span>${m.low}</span><span>${m.high}</span></div>`;

        containers[m.group].appendChild(row);
      });

      // Event-delegation: ett klick på ett ansikte väljer (eller avmarkerar).
      Object.values(containers).forEach((c) =>
        c.addEventListener("click", (e) => {
          const face = e.target.closest(".face");
          if (face) selectFace(face.dataset.id, Number(face.dataset.value));
        })
      );
    }

    // Välj ett värde – eller avmarkera om man trycker på det redan valda.
    function selectFace(id, value) {
      if (selections[id] === value) delete selections[id];
      else selections[id] = value;
      renderMetric(id);
    }

    // Uppdatera ansiktenas markering för EN metrik.
    function renderMetric(id) {
      const selected = selections[id];
      document.querySelectorAll(`.face[data-id="${id}"]`).forEach((face) => {
        face.classList.toggle("selected", Number(face.dataset.value) === selected);
      });
    }

    // Spegla hela state (alla metriker + sömntimmar + fritext) till DOM.
    function renderSelections(rec) {
      MOOD_METRICS.forEach((m) => renderMetric(m.id));
      document.getElementById("sleep-hours").value =
        rec && rec.sleepHours != null ? rec.sleepHours : "";
      document.getElementById("mood-note").value = (rec && rec.note) || "";
    }

    // Formatera datumraden på svenska + badge "Idag"/"Igår".
    function renderDateNav() {
      const d = new Date(moodDate + "T00:00:00");
      document.getElementById("mood-date-text").textContent =
        new Intl.DateTimeFormat("sv-SE", {
          weekday: "long", day: "numeric", month: "long",
        }).format(d);

      let badge = "";
      if (moodDate === todayISO()) badge = "Idag";
      else if (moodDate === shiftDate(todayISO(), -1)) badge = "Igår";
      document.getElementById("mood-date-badge").textContent = badge;

      // Ingen loggning i framtiden.
      document.getElementById("mood-next").disabled = moodDate >= todayISO();
    }

    // Ladda en dags post och fyll formuläret (tomt om dagen saknas).
    async function loadMoodForDate(dateISO) {
      moodDate = dateISO;
      const rec = await getRecord("mood", dateISO);
      selections = rec && rec.scores ? { ...rec.scores } : {};
      renderSelections(rec);
      renderDateNav();
    }

    // Spara dagens post (put = upsert, ingen dubblett). Tomma fält utelämnas.
    async function saveMood() {
      const hoursRaw = document.getElementById("sleep-hours").value.trim();
      const note = document.getElementById("mood-note").value.trim();

      const record = {
        date: moodDate,
        scores: { ...selections },
        updatedAt: new Date().toISOString(),
      };
      if (hoursRaw !== "") {
        const h = parseFloat(hoursRaw.replace(",", "."));
        if (!isNaN(h)) record.sleepHours = Math.min(14, Math.max(0, h));
      }
      if (note !== "") record.note = note;

      await addRecord("mood", record);
      showToast("Sparat ✓");
    }

    // --- Datum-knappar (bläddra bakåt; aldrig framåt förbi idag) ---
    document.getElementById("mood-prev")
      .addEventListener("click", () => loadMoodForDate(shiftDate(moodDate, -1)));
    document.getElementById("mood-next").addEventListener("click", () => {
      if (moodDate < todayISO()) loadMoodForDate(shiftDate(moodDate, 1));
    });

    // --- Sömn-stegare (0–14, halvtimmessteg) ---
    function stepSleep(delta) {
      const input = document.getElementById("sleep-hours");
      const current =
        input.value.trim() === "" ? 0 : parseFloat(input.value.replace(",", "."));
      let next = (isNaN(current) ? 0 : current) + delta;
      next = Math.min(14, Math.max(0, Math.round(next * 2) / 2));
      input.value = next;
    }
    document.getElementById("sleep-minus")
      .addEventListener("click", () => stepSleep(-0.5));
    document.getElementById("sleep-plus")
      .addEventListener("click", () => stepSleep(0.5));

    // --- Spara-knapp ---
    document.getElementById("btn-save-mood").addEventListener("click", saveMood);

    // Liten bekräftelse-bubbla (återanvändbar av andra vyer).
    let _toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
    }

    // Bygg raderna och ladda dagens post direkt så vyn är redo.
    buildMetricRows();
    loadMoodForDate(todayISO());

    /* ======================================================================
       f) MEDICIN-VYN (escitalopram i omgångar)

       Antonia tar inte medicinen dagligen, utan i "omgångar" (kurer): en serie
       sammanhängande dagar, från att PMDS-symtomen börjar tills de släpper.
       Datamodell:
         - medication: en post per loggad dag { id, date, omgangId, dos }
         - courses:    en post per omgång    { omgangId, startdatum, slutdatum, active }
       Antal dagar i en omgång HÄRLEDS från medication-posterna (ingen dubbel
       bokföring), så att tillagda/borttagna dagar alltid stämmer.
       (showToast() återanvänds från Måendevyn ovan.)
       =================================================================== */
    const medicinContent = document.getElementById("medicin-content");

    // Dos-snabbval (mg). Dos sätts per dag och kan skilja mellan dagar.
    const DOSE_OPTIONS = [5, 10, 15, 20];
    const DEFAULT_DOSE = 10;

    // Vilken omgång som är "utfälld" i historiken (null = ingen).
    let expandedCourse = null;

    /* --- Datum- & textformat (svenska) --- */
    const MED_MONTHS_SHORT = ["jan","feb","mar","apr","maj","jun",
                              "jul","aug","sep","okt","nov","dec"];
    const MED_MONTHS_LONG = ["januari","februari","mars","april","maj","juni",
                             "juli","augusti","september","oktober","november","december"];

    // Antal hela dygn mellan två YYYY-MM-DD-datum (b − a). Lokal tid.
    function daysBetween(aISO, bISO) {
      const a = new Date(aISO + "T00:00:00");
      const b = new Date(bISO + "T00:00:00");
      return Math.round((b - a) / 86400000);
    }
    function fmtShort(iso) {
      const [, m, d] = iso.split("-").map(Number);
      return d + " " + MED_MONTHS_SHORT[m - 1];
    }
    function fmtLong(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return d + " " + MED_MONTHS_LONG[m - 1] + " " + y;
    }
    // "1 dag" / "3 dagar"
    function dagar(n) { return n + (n === 1 ? " dag" : " dagar"); }

    /* --- Datahämtning --- */
    async function getActiveCourse() {
      const courses = await getAll("courses");
      return courses.find((c) => c.active) || null;
    }
    async function getDaysFor(omgangId) {
      const all = await getAll("medication");
      return all
        .filter((m) => m.omgangId === omgangId)
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    /* --- Dos-väljare (radio-liknande knapprad) --- */
    function doseGroupHTML(id, selected) {
      const opts = DOSE_OPTIONS.map((mg) =>
        '<button type="button" class="dose-opt' +
        (mg === selected ? " selected" : "") +
        '" data-dose="' + mg + '">' + mg + "</button>"
      ).join("");
      return '<div class="dose-label">Dos (mg)</div>' +
             '<div class="dose-group" id="' + id + '">' + opts + "</div>";
    }
    function getSelectedDose(groupEl) {
      if (!groupEl) return DEFAULT_DOSE;
      const sel = groupEl.querySelector(".dose-opt.selected");
      return sel ? Number(sel.dataset.dose) : DEFAULT_DOSE;
    }

    /* --- Bygg STATUS-kortet (tydligt olika för pågående vs ingen omgång) --- */
    function buildStatus(active, activeDays) {
      // INGEN omgång: lugnt, neutralt kort med en enda inbjudande knapp.
      if (!active) {
        return '<div class="card status-card idle">' +
          '<div class="status-eyebrow">Ingen pågående omgång</div>' +
          '<p class="status-sub" style="margin:8px 0 0">Just nu loggar du ingen ' +
            'escitalopram. När symtomen börjar kan du starta en ny omgång.</p>' +
          doseGroupHTML("dose-start", DEFAULT_DOSE) +
          '<button type="button" class="btn" data-act="start">Börja en ny omgång</button>' +
          "</div>";
      }

      // PÅGÅENDE omgång: varmt accent-kort. "Dag X" = antal bockade dagar.
      const taken = activeDays.some((d) => d.date === todayISO());
      const n = activeDays.length;
      let html = '<div class="card status-card active">';
      html += '<div class="status-eyebrow">Pågående omgång</div>';
      html += '<div class="day-counter">Dag ' + n + "</div>";
      html += '<div class="status-sub">Startade ' + fmtLong(active.startdatum) + "</div>";
      if (taken) html += '<div class="taken-today">✓ Tagen idag</div>';

      // Dos-väljare visas bara om dagen inte redan är bockad.
      if (!taken) html += doseGroupHTML("dose-today", DEFAULT_DOSE);
      html += '<button type="button" class="btn big" data-act="today"' +
              (taken ? " disabled" : "") + ">" +
              (taken ? "✓ Redan bockad idag" : "Jag tog den idag") + "</button>";

      // Logga en glömd dag bakåt i tiden (begränsat till omgångens intervall).
      html += '<div class="dose-label" style="margin-top:16px">Glömt en dag? Logga i efterhand</div>';
      html += doseGroupHTML("dose-backdate", DEFAULT_DOSE);
      html += '<div class="backdate-row">' +
              '<input type="date" id="backdate-input" min="' + active.startdatum +
              '" max="' + todayISO() + '">' +
              '<button type="button" class="btn" data-act="backdate">Lägg till</button></div>';

      // Avsluta omgången (sätter slutdatum).
      html += '<button type="button" class="btn secondary" data-act="end">Avsluta omgången</button>';
      html += "</div>";
      return html;
    }

    /* --- Bygg STATISTIK (visas bara när ingen omgång pågår) --- */
    function buildStats(courses, daysByCourse) {
      const ended = courses
        .filter((c) => !c.active && c.slutdatum)
        .sort((a, b) => a.startdatum.localeCompare(b.startdatum));

      // Inget att visa förrän minst en omgång är avslutad – dölj snyggt.
      if (ended.length === 0) return "";

      // Dagar sedan den senast avslutade omgången.
      const lastSlut = ended.reduce(
        (mx, c) => (c.slutdatum > mx ? c.slutdatum : mx), ended[0].slutdatum
      );
      const since = daysBetween(lastSlut, todayISO());

      // Snittlängd (antal loggade dagar) och snittligt mellanrum mellan omgångar.
      const lengths = ended
        .map((c) => (daysByCourse[c.omgangId] || []).length)
        .filter((x) => x > 0);
      const avgLen = lengths.length
        ? Math.round(lengths.reduce((a, b) => a + b, 0) / lengths.length) : null;

      const gaps = [];
      for (let i = 1; i < ended.length; i++) {
        gaps.push(daysBetween(ended[i - 1].slutdatum, ended[i].startdatum));
      }
      const avgGap = gaps.length
        ? Math.round(gaps.reduce((a, b) => a + b, 0) / gaps.length) : null;

      let html = '<div class="card">';
      html += '<div class="status-eyebrow" style="color:var(--muted)">Mönster</div>';

      // Lugn ledtext som hjälper henne ana nästa omgång (kräver ≥2 omgångar).
      if (avgGap != null) {
        const remaining = avgGap - since;
        html += remaining > 3
          ? '<p class="stat-lead">Om mönstret håller kan nästa omgång närma sig ' +
              'om ungefär ' + dagar(remaining) + ".</p>"
          : '<p class="stat-lead">Det är ungefär så här långt det brukar gå mellan ' +
              "omgångar – håll lite extra koll. 💗</p>";
      }

      html += '<div class="stat-row"><span>Sedan förra omgången slutade</span>' +
              '<span class="stat-val">' + dagar(since) + "</span></div>";
      if (ended.length >= 2) {
        if (avgLen != null)
          html += '<div class="stat-row"><span>Snittlängd på en omgång</span>' +
                  '<span class="stat-val">' + dagar(avgLen) + "</span></div>";
        if (avgGap != null)
          html += '<div class="stat-row"><span>Brukar gå mellan omgångar</span>' +
                  '<span class="stat-val">' + dagar(avgGap) + "</span></div>";
      }
      html += "</div>";
      return html;
    }

    /* --- Bygg HISTORIK (tidslinje, nyast först) --- */
    function buildHistory(courses, daysByCourse) {
      let html = '<h2 class="group-title">Historik</h2><div class="card">';
      if (courses.length === 0) {
        return html + '<p class="empty-hint">Inga omgångar loggade ännu.</p></div>';
      }

      const sorted = courses.slice()
        .sort((a, b) => b.startdatum.localeCompare(a.startdatum));
      // Längsta omgången styr stapelskalan.
      const maxDays = Math.max(
        1, ...courses.map((c) => (daysByCourse[c.omgangId] || []).length)
      );

      sorted.forEach((c) => {
        const days = (daysByCourse[c.omgangId] || []).slice()
          .sort((a, b) => a.date.localeCompare(b.date));
        const n = days.length;
        const dateLabel = c.active
          ? fmtShort(c.startdatum) + " – pågår"
          : fmtShort(c.startdatum) + " – " + fmtShort(c.slutdatum);

        html += '<div class="course-item" data-act="toggle" data-course="' + c.omgangId + '">';
        html += '<div class="course-head"><span class="course-dates">' + dateLabel +
                (c.active ? ' <span class="course-tag">pågående</span>' : "") +
                '</span><span class="course-days">' + dagar(n) + "</span></div>";
        html += '<div class="course-bar"><span style="width:' +
                Math.round((n / maxDays) * 100) + '%"></span></div>';

        // Utfälld lista med omgångens dagar + möjlighet att ta bort en felregg dag.
        if (expandedCourse === c.omgangId) {
          html += '<div class="course-days-list">';
          if (n === 0) {
            html += '<p class="empty-hint">Inga loggade dagar.</p>';
          } else {
            days.forEach((d) => {
              html += '<div class="day-row"><span>' + fmtLong(d.date) +
                      (d.dos ? " · " + d.dos + " mg" : "") + "</span>" +
                      '<button type="button" class="day-del" data-act="del-day" data-id="' +
                      d.id + '">Ta bort</button></div>';
            });
          }
          html += "</div>";
        }
        html += "</div>";
      });

      return html + "</div>";
    }

    // Bygg om hela Medicin-vyn från databasen. Anropas vid visning + efter åtgärd.
    async function renderMedicin() {
      const [courses, meds] = await Promise.all([
        getAll("courses"), getAll("medication"),
      ]);
      const active = courses.find((c) => c.active) || null;

      // Gruppera dagar per omgång (en gång) → härled antal & utfällning.
      const daysByCourse = {};
      for (const m of meds) {
        (daysByCourse[m.omgangId] = daysByCourse[m.omgangId] || []).push(m);
      }
      const activeDays = active ? (daysByCourse[active.omgangId] || []) : [];
      const takenToday = activeDays.some((d) => d.date === todayISO());

      let html = "";
      // Morgon-påminnelse (fallback): bara under pågående omgång + om ej bockad idag.
      if (active && !takenToday) {
        html += '<div class="med-banner"><span class="banner-icon">💊</span>' +
                '<span class="banner-text">Dags att ta escitalopram idag</span>' +
                '<button type="button" class="banner-btn" data-act="today">Bocka</button></div>';
      }
      html += buildStatus(active, activeDays);
      if (!active) html += buildStats(courses, daysByCourse);
      html += buildHistory(courses, daysByCourse);

      medicinContent.innerHTML = html;
    }

    /* --- Åtgärder --- */

    // Börja en ny omgång: skapa course + logga dagens dos.
    async function startCourse() {
      const dose = getSelectedDose(document.getElementById("dose-start"));
      const today = todayISO();
      const omgangId = "c" + Date.now();
      await addRecord("courses", {
        omgangId, startdatum: today, slutdatum: null, active: true,
      });
      await addRecord("medication", { date: today, omgangId, dos: dose });
      requestNotifPermission(); // be om notis-lov nu när en omgång faktiskt startar
      showToast("Ny omgång påbörjad 💗");
      await renderMedicin();
    }

    // Bocka dagens dos i den pågående omgången.
    async function logToday() {
      const active = await getActiveCourse();
      if (!active) return;
      const today = todayISO();
      const days = await getDaysFor(active.omgangId);
      if (days.some((d) => d.date === today)) {
        showToast("Redan bockad idag");
        await renderMedicin();
        return;
      }
      const dose = getSelectedDose(document.getElementById("dose-today"));
      await addRecord("medication", { date: today, omgangId: active.omgangId, dos: dose });
      showToast("Bockad för idag ✓");
      await renderMedicin();
    }

    // Logga en glömd dag bakåt i tiden (inom omgångens intervall).
    async function backdateDay() {
      const active = await getActiveCourse();
      if (!active) return;
      const input = document.getElementById("backdate-input");
      const date = input && input.value;
      if (!date) { showToast("Välj ett datum först"); return; }
      if (date > todayISO()) { showToast("Kan inte logga framtida datum"); return; }
      if (date < active.startdatum) { showToast("Datumet ligger före omgångens start"); return; }
      const days = await getDaysFor(active.omgangId);
      if (days.some((d) => d.date === date)) { showToast("Dagen är redan loggad"); return; }
      const dose = getSelectedDose(document.getElementById("dose-backdate"));
      await addRecord("medication", { date, omgangId: active.omgangId, dos: dose });
      showToast(fmtShort(date) + " tillagd");
      await renderMedicin();
    }

    // Avsluta omgången: sätt slutdatum + active=false.
    async function endCourse() {
      const active = await getActiveCourse();
      if (!active) return;
      if (!confirm("Vill du avsluta den pågående omgången?")) return;
      active.slutdatum = todayISO();
      active.active = false;
      await addRecord("courses", active); // put = upsert på omgangId
      showToast("Omgången avslutad");
      await renderMedicin();
    }

    // Ta bort en felregistrerad dag.
    async function deleteDay(id) {
      if (!confirm("Ta bort den här dagen?")) return;
      await deleteRecord("medication", Number(id));
      showToast("Dag borttagen");
      await renderMedicin();
    }

    // Delegerad klick-hantering (sätts EN gång; innehållet byts ju ut vid render).
    medicinContent.addEventListener("click", async (e) => {
      // Dos-val: markera klickad knapp inom sin grupp.
      const doseBtn = e.target.closest(".dose-opt");
      if (doseBtn) {
        const group = doseBtn.closest(".dose-group");
        group.querySelectorAll(".dose-opt")
          .forEach((b) => b.classList.toggle("selected", b === doseBtn));
        return;
      }
      const actEl = e.target.closest("[data-act]");
      if (!actEl) return;
      switch (actEl.dataset.act) {
        case "start":    await startCourse(); break;
        case "today":    await logToday(); break;
        case "backdate": await backdateDay(); break;
        case "end":      await endCourse(); break;
        case "del-day":  await deleteDay(actEl.dataset.id); break;
        case "toggle":
          expandedCourse =
            expandedCourse === actEl.dataset.course ? null : actEl.dataset.course;
          await renderMedicin();
          break;
      }
    });

    /* --- Påminnelser ---
       VIKTIGT om iOS: webb-notiser fungerar bara för en PWA som lagts till på
       hemskärmen, och stödet är begränsat. Framför allt går det INTE att lita på
       schemalagda bakgrundsnotiser kl 08:00 utan en push-server (som den här
       appen medvetet saknar – allt är lokalt). Därför:
         1) Best-effort: en lokal notis när appen öppnas (om lov getts).
         2) Huvudlösning: in-app-bannern i vyn ovan, som alltid syns när hon
            öppnar appen under en pågående omgång och inte bockat idag. */
    function requestNotifPermission() {
      try {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      } catch (_) { /* äldre iOS saknar Notification helt – strunta tyst */ }
    }

    async function maybeNotifyMorning() {
      try {
        if (!("Notification" in window) || Notification.permission !== "granted") return;
        if (new Date().getHours() < 8) return;          // för tidigt på dygnet
        const active = await getActiveCourse();
        if (!active) return;                            // ingen omgång → ingen notis
        const days = await getDaysFor(active.omgangId);
        if (days.some((d) => d.date === todayISO())) return; // redan tagen idag
        if (localStorage.getItem("med-notif-shown") === todayISO()) return; // max 1/dag
        localStorage.setItem("med-notif-shown", todayISO());
        new Notification("Dags att ta escitalopram 💊", {
          body: "Glöm inte din dos idag.",
          icon: "icons/icon-192.png",
        });
      } catch (_) { /* tyst – notiser är sekundära */ }
    }

    /* ======================================================================
       g) BLÖDNINGSVY – mellanblödningar & framsläppt mens

       Antonia tar p-piller kontinuerligt och har sällan mens. Hon behöver inte
       cykel-prediktion, utan ett lugnt sätt att registrera faktiska
       blödningshändelser och hur hon mår kring dem.

       FLERDAGARS-VAL: hon loggar EN DAG I TAGET (flöde och mående varierar ju
       mellan dagar). Historiken grupperar sedan sammanhängande datum till
       "händelser" automatiskt – precis som Medicin-vyn härleder en omgångs
       längd ur de loggade dagarna. Det slipper ett separat start/slut-bokförande
       som kan bli inkonsekvent, och "logga idag" / "logga bakåt" blir samma sak.

       Datamodell (store "bleeding", logiskt 1 rad/datum – vi gör upsert-på-datum
       själva): { id, date, type, flow, mood?, note?, updatedAt }.
       (todayISO, daysBetween, fmtShort, fmtLong, dagar, EMOJI, showToast och
        getAll/addRecord/deleteRecord återanvänds från sektionerna ovan.)
       =================================================================== */
    const bleedingContent = document.getElementById("bleeding-content");
    const bleedFormEl = document.getElementById("bleed-form");

    // Valbara typer & flöden. id = sparas i DB, label = visas i UI.
    const BLEED_TYPES = [
      { id: "mellanblodning", label: "Mellanblödning", tag: "mellan" },
      { id: "framslappt",     label: "Framsläppt mens", tag: "mens" },
    ];
    const BLEED_FLOWS = [
      { id: "spotting", label: "Spotting" },
      { id: "latt",     label: "Lätt" },
      { id: "medel",    label: "Medel" },
      { id: "rikligt",  label: "Rikligt" },
    ];

    // Slå upp etikett för ett sparat id (tål okända/äldre värden).
    function bleedTypeLabel(id) {
      const t = BLEED_TYPES.find((x) => x.id === id);
      return t ? t.label : (id || "–");
    }
    function bleedFlowLabel(id) {
      const f = BLEED_FLOWS.find((x) => x.id === id);
      return f ? f.label : (id || "–");
    }

    // --- Formulär-state (transient, hålls i JS så att re-render av historiken
    //     inte nollar de val man håller på att göra) ---
    let bleedEditId = null;   // null = ny post, annars id:t vi redigerar
    let expandedEvent = null; // start-datum för utfälld händelse (null = ingen)
    let bleedSel = { date: todayISO(), type: null, flow: null, mood: null };

    // Bygg en knapprad (.dose-group-stil) av alternativ; markera valt.
    function bleedOptionsHTML(items, selectedId) {
      return items.map((it) =>
        '<button type="button" class="dose-opt' +
        (it.id === selectedId ? " selected" : "") +
        '" data-opt="' + it.id + '">' + it.label + "</button>"
      ).join("");
    }

    // Bygg de fem måendeansiktena (valfritt; samma valence-skala som Måendevyn).
    function bleedFacesHTML(selected) {
      return EMOJI.valence.map((emoji, i) =>
        '<button type="button" class="face' +
        (i + 1 === selected ? " selected" : "") +
        '" data-mood="' + (i + 1) + '" aria-label="' + (i + 1) + ' av 5">' +
        emoji + "</button>"
      ).join("");
    }

    // Spegla hela formulär-state till DOM.
    function renderBleedForm() {
      document.getElementById("bleed-date").value = bleedSel.date;
      document.getElementById("bleed-date").max = todayISO();
      document.getElementById("bleed-type").innerHTML =
        bleedOptionsHTML(BLEED_TYPES, bleedSel.type);
      document.getElementById("bleed-flow").innerHTML =
        bleedOptionsHTML(BLEED_FLOWS, bleedSel.flow);
      document.getElementById("bleed-mood").innerHTML =
        bleedFacesHTML(bleedSel.mood);
      document.getElementById("bleed-note").value = bleedSel.note || "";
    }

    // Öppna formuläret. Med rec = redigera befintlig post, annars ny (tomt).
    function openBleedForm(rec) {
      if (rec) {
        bleedEditId = rec.id;
        bleedSel = {
          date: rec.date, type: rec.type || null, flow: rec.flow || null,
          mood: rec.mood || null, note: rec.note || "",
        };
      } else {
        bleedEditId = null;
        bleedSel = { date: todayISO(), type: null, flow: null, mood: null, note: "" };
      }
      renderBleedForm();
      bleedFormEl.classList.add("open");
      bleedFormEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function closeBleedForm() {
      bleedFormEl.classList.remove("open");
      bleedEditId = null;
    }

    // Spara dagens blödning. Typ + flöde krävs; mående + anteckning är valfria.
    async function saveBleed() {
      bleedSel.date = document.getElementById("bleed-date").value || todayISO();
      bleedSel.note = document.getElementById("bleed-note").value.trim();

      if (bleedSel.date > todayISO()) { showToast("Kan inte logga framtida datum"); return; }
      if (!bleedSel.type || !bleedSel.flow) { showToast("Välj typ och flöde"); return; }

      // 1 rad/datum: leta ev. befintlig post för datumet (om vi inte redan
      // redigerar den) och uppdatera den istället för att skapa en dubblett.
      const all = await getAll("bleeding");
      let id = bleedEditId;
      if (id == null) {
        const existing = all.find((b) => b.date === bleedSel.date);
        if (existing) id = existing.id;
      }

      const record = {
        date: bleedSel.date,
        type: bleedSel.type,
        flow: bleedSel.flow,
        updatedAt: new Date().toISOString(),
      };
      if (id != null) record.id = id;          // behåll id → put blir uppdatering
      if (bleedSel.mood) record.mood = bleedSel.mood;
      if (bleedSel.note) record.note = bleedSel.note;

      await addRecord("bleeding", record);
      closeBleedForm();
      showToast(id != null ? "Uppdaterad ✓" : "Sparat ✓");
      await renderBleeding();
    }

    // Ta bort en enskild dag.
    async function deleteBleed(id) {
      if (!confirm("Ta bort den här blödningsdagen?")) return;
      await deleteRecord("bleeding", Number(id));
      showToast("Borttagen");
      await renderBleeding();
    }

    /* --- Gruppera dagar till händelser (löpande datum utan lucka) --- */
    function groupEvents(entries) {
      const sorted = entries.slice().sort((a, b) => a.date.localeCompare(b.date));
      const events = [];
      let cur = null;
      for (const e of sorted) {
        // Ny händelse om det är första posten eller om luckan är > 1 dygn.
        if (!cur || daysBetween(cur.end, e.date) > 1) {
          cur = { start: e.date, end: e.date, days: [e] };
          events.push(cur);
        } else {
          cur.end = e.date;
          cur.days.push(e);
        }
      }
      // Härled längd + gemensam typ ("blandat" om dagarna skiljer sig).
      events.forEach((ev) => {
        ev.len = ev.days.length;
        const types = new Set(ev.days.map((d) => d.type));
        ev.type = types.size === 1 ? [...types][0] : "blandat";
      });
      return events;
    }

    /* --- Statistik (lugn, ingen tvärsäker prognos) --- */
    function buildBleedStats(entries, events) {
      if (entries.length === 0) return "";

      // Senast loggade blödningsdag → "X dagar sedan" / "idag".
      const lastDate = entries.reduce(
        (mx, e) => (e.date > mx ? e.date : mx), entries[0].date
      );
      const since = daysBetween(lastDate, todayISO());
      const sinceText = since <= 0 ? "Idag" : dagar(since) + " sedan";

      // Snitt-mellanrum mellan händelser (start − föregående slut). Kräver ≥2.
      const sortedEv = events.slice().sort((a, b) => a.start.localeCompare(b.start));
      const gaps = [];
      for (let i = 1; i < sortedEv.length; i++) {
        gaps.push(daysBetween(sortedEv[i - 1].end, sortedEv[i].start));
      }
      const avgGap = gaps.length
        ? Math.round(gaps.reduce((a, b) => a + b, 0) / gaps.length) : null;

      // Snittlängd på en händelse.
      const avgLen = events.length
        ? Math.round(events.reduce((a, b) => a + b.len, 0) / events.length) : null;

      let html = '<div class="card">';
      html += '<div class="status-eyebrow" style="color:var(--muted)">Översikt</div>';
      html += '<div class="stat-row"><span>Senaste blödning</span>' +
              '<span class="stat-val">' + sinceText + "</span></div>";
      if (avgLen != null && events.length >= 1)
        html += '<div class="stat-row"><span>Snittlängd på en blödning</span>' +
                '<span class="stat-val">' + dagar(avgLen) + "</span></div>";
      if (avgGap != null)
        html += '<div class="stat-row"><span>Brukar gå mellan blödningar</span>' +
                '<span class="stat-val">' + dagar(avgGap) + "</span></div>";

      // Varm, försiktig ledtext (ingen prognos) när det finns ett mönster.
      if (avgGap != null) {
        html += '<p class="hint" style="margin-top:12px">Det här är bara ett ' +
                'ungefärligt snitt – kroppen följer inte schema. 💗</p>';
      }
      html += "</div>";
      return html;
    }

    /* --- Historik (tidslinje, nyast först) --- */
    function buildBleedHistory(events) {
      let html = '<h2 class="group-title">Historik</h2><div class="card">';
      if (events.length === 0) {
        return html + '<p class="empty-hint">Inga blödningar loggade ännu.</p></div>';
      }

      const sorted = events.slice().sort((a, b) => b.start.localeCompare(a.start));
      const maxLen = Math.max(1, ...events.map((e) => e.len));

      sorted.forEach((ev) => {
        const dateLabel = ev.len === 1
          ? fmtShort(ev.start)
          : fmtShort(ev.start) + " – " + fmtShort(ev.end);
        const tagClass = ev.type === "blandat" ? "blandat"
          : (BLEED_TYPES.find((t) => t.id === ev.type) || {}).tag || "mellan";
        const tagText = ev.type === "blandat" ? "Blandat" : bleedTypeLabel(ev.type);

        html += '<div class="course-item" data-act="toggle" data-event="' + ev.start + '">';
        html += '<div class="course-head"><span class="course-dates">' + dateLabel +
                '<span class="bleed-tag ' + tagClass + '">' + tagText + '</span>' +
                '</span><span class="course-days">' + dagar(ev.len) + "</span></div>";
        html += '<div class="course-bar"><span style="width:' +
                Math.round((ev.len / maxLen) * 100) + '%"></span></div>';

        // Utfälld: en rad per dag med flöde/mående + redigera/ta bort.
        if (expandedEvent === ev.start) {
          const days = ev.days.slice().sort((a, b) => a.date.localeCompare(b.date));
          html += '<div class="course-days-list">';
          days.forEach((d) => {
            const moodEmoji = d.mood ? " · " + EMOJI.valence[d.mood - 1] : "";
            html += '<div class="bleed-day"><div class="bleed-day-head">' +
                    '<div><div class="bleed-day-date">' + fmtLong(d.date) + "</div>" +
                    '<div class="bleed-day-meta">' + bleedTypeLabel(d.type) + " · " +
                    bleedFlowLabel(d.flow) + moodEmoji + "</div></div>" +
                    '<div class="bleed-day-btns">' +
                    '<button type="button" class="day-del" data-act="edit" data-id="' +
                    d.id + '">Redigera</button>' +
                    '<button type="button" class="day-del" data-act="del" data-id="' +
                    d.id + '">Ta bort</button></div></div>';
            if (d.note)
              html += '<div class="bleed-day-note">' +
                      d.note.replace(/[<>&]/g, (c) =>
                        ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c])) + "</div>";
            html += "</div>";
          });
          html += "</div>";
        }
        html += "</div>";
      });

      return html + "</div>";
    }

    // Bygg om hela vyn (utom det statiska formuläret) från databasen.
    async function renderBleeding() {
      const entries = await getAll("bleeding");
      const events = groupEvents(entries);
      bleedingContent.innerHTML =
        buildBleedStats(entries, events) + buildBleedHistory(events);
    }

    /* --- Klickhantering i FORMULÄRET (typ/flöde/mående togglas) --- */
    bleedFormEl.addEventListener("click", (e) => {
      const opt = e.target.closest(".dose-opt");
      if (opt) {
        // Vilken grupp? (typ eller flöde) → uppdatera state + markering.
        const group = opt.closest(".dose-group");
        if (group.id === "bleed-type") bleedSel.type = opt.dataset.opt;
        if (group.id === "bleed-flow") bleedSel.flow = opt.dataset.opt;
        group.querySelectorAll(".dose-opt")
          .forEach((b) => b.classList.toggle("selected", b === opt));
        return;
      }
      const face = e.target.closest(".face");
      if (face) {
        const val = Number(face.dataset.mood);
        // Klick på redan valt ansikte = avmarkera (mående är valfritt).
        bleedSel.mood = bleedSel.mood === val ? null : val;
        document.querySelectorAll("#bleed-mood .face").forEach((f) =>
          f.classList.toggle("selected", Number(f.dataset.mood) === bleedSel.mood));
      }
    });

    document.getElementById("btn-bleed-today")
      .addEventListener("click", () => openBleedForm());
    document.getElementById("btn-bleed-cancel")
      .addEventListener("click", closeBleedForm);
    document.getElementById("btn-bleed-save")
      .addEventListener("click", saveBleed);

    /* --- Delegerad klickhantering i HISTORIKEN (sätts en gång) --- */
    bleedingContent.addEventListener("click", async (e) => {
      const actEl = e.target.closest("[data-act]");
      if (!actEl) return;
      switch (actEl.dataset.act) {
        case "toggle":
          expandedEvent =
            expandedEvent === actEl.dataset.event ? null : actEl.dataset.event;
          await renderBleeding();
          break;
        case "edit": {
          const all = await getAll("bleeding");
          const rec = all.find((b) => b.id === Number(actEl.dataset.id));
          if (rec) openBleedForm(rec);
          break;
        }
        case "del":
          await deleteBleed(actEl.dataset.id);
          break;
      }
    });

    // Bygg vyn en gång vid start så den är redo (renderas även vid varje byte).
    renderBleeding();

    /* ======================================================================
       h) IDAG-VYN – lugn daglig översikt

       Drar ihop dagens läge från de andra vyerna (mående, medicin, blödning)
       till en snabb bild. Bygger om sig från databasen varje gång den visas.
       Återanvänder hjälpare från sektionerna ovan: getRecord, getAll, todayISO,
       daysBetween, fmtLong, EMOJI, MOOD_METRICS, bleedTypeLabel/bleedFlowLabel,
       showView, loadMoodForDate, logToday, showToast.
       =================================================================== */
    const idagContent = document.getElementById("idag-content");

    // Nyckeltal som lyfts fram i måendesammanfattningen (i denna ordning).
    const IDAG_MOOD_KEYS = ["humor", "energi", "angest"];

    // Tidsanpassad hälsning – hålls enkel och varm.
    function greetingFor(d) {
      const h = d.getHours();
      if (h < 10) return "God morgon";
      if (h < 17) return "God dag";
      return "God kväll";
    }

    // Visa timmar med svenskt decimalkomma (7.5 → "7,5").
    function fmtHours(n) {
      return String(n).replace(".", ",");
    }

    // En chip: emoji + etikett för en ifylld måendeskattning.
    function moodChip(metric, value) {
      const emoji = EMOJI[metric.scale][value - 1];
      return '<span class="chip">' + emoji + " " + metric.label + "</span>";
    }

    // Bygg "Dagens mående"-kortet.
    function buildIdagMood(moodRec) {
      const scores = (moodRec && moodRec.scores) || {};
      const loggat = Object.keys(scores).length > 0 ||
        (moodRec && (moodRec.sleepHours != null || moodRec.note));

      let html = '<div class="card">';
      html += '<div class="status-eyebrow">Dagens mående</div>';

      if (loggat) {
        // Chips för de viktigaste nyckeltalen som faktiskt fyllts i.
        const chips = IDAG_MOOD_KEYS
          .filter((id) => scores[id] != null)
          .map((id) => moodChip(MOOD_METRICS.find((m) => m.id === id), scores[id]));
        if (moodRec.sleepHours != null) {
          chips.push('<span class="chip">💤 ' + fmtHours(moodRec.sleepHours) + " tim</span>");
        }
        html += chips.length
          ? '<div class="summary-chips">' + chips.join("") + "</div>"
          : '<p class="status-sub" style="margin:8px 0 0">Loggat för idag ✓</p>';
        html += '<button type="button" class="btn secondary" data-act="mood">Ändra</button>';
      } else {
        html += '<p class="status-sub" style="margin:8px 0 12px">' +
          "Hur känns dagen? En liten check-in hjälper dig se mönster över tid.</p>";
        html += '<button type="button" class="btn" data-act="mood">Logga dagens mående</button>';
      }
      return html + "</div>";
    }

    // Bygg "Medicin"-kortet (pågående omgång vs ingen).
    function buildIdagMed(courses, meds, today) {
      const active = courses.find((c) => c.active) || null;
      let html = '<div class="card">';
      html += '<div class="status-eyebrow">Medicin</div>';

      if (active) {
        const days = meds.filter((m) => m.omgangId === active.omgangId);
        const tagen = days.some((d) => d.date === today);
        html += '<div class="idag-med-head">Omgång pågår – dag ' + days.length + "</div>";
        if (tagen) {
          html += '<div class="taken-today">✓ Tagen idag</div>';
        } else {
          html += '<p class="status-sub" style="margin:6px 0 0">Dagens dos är inte bockad ännu.</p>';
          html += '<button type="button" class="btn big" data-act="med-today">Jag tog den idag</button>';
        }
      } else {
        html += '<p class="status-sub" style="margin:6px 0 0">Ingen omgång pågår just nu.</p>';
        // Dagar sedan den senast avslutade omgången, om någon finns.
        const ended = courses.filter((c) => !c.active && c.slutdatum);
        if (ended.length) {
          const lastSlut = ended.reduce(
            (mx, c) => (c.slutdatum > mx ? c.slutdatum : mx), ended[0].slutdatum
          );
          html += '<p class="status-sub" style="margin:4px 0 0">' +
            dagar(daysBetween(lastSlut, today)) + " sedan senaste omgången.</p>";
        }
      }
      return html + "</div>";
    }

    // Bygg blödningsraden (klickbar → öppnar Blödningar-vyn).
    function buildIdagBleed(bleed, today) {
      const rec = bleed.find((b) => b.date === today);
      const text = rec
        ? "Blödning loggad idag · " + bleedTypeLabel(rec.type) +
          ", " + bleedFlowLabel(rec.flow).toLowerCase()
        : "Ingen blödning loggad idag";
      return '<button type="button" class="card-link" data-act="blod">' +
        '<span>🩸 ' + text + "</span><span class=\"card-link-arrow\">›</span></button>";
    }

    // Bygg om hela Idag-vyn från databasen.
    async function renderIdag() {
      const today = todayISO();
      const [moodRec, courses, meds, bleed] = await Promise.all([
        getRecord("mood", today), getAll("courses"),
        getAll("medication"), getAll("bleeding"),
      ]);

      const dateStr = new Intl.DateTimeFormat("sv-SE", {
        weekday: "long", day: "numeric", month: "long",
      }).format(new Date(today + "T00:00:00"));

      let html = '<div class="greeting">' + greetingFor(new Date()) + " 💗</div>";
      html += '<div class="greeting-date">' + dateStr + "</div>";
      html += buildIdagMood(moodRec);
      html += buildIdagMed(courses, meds, today);
      html += buildIdagBleed(bleed, today);

      idagContent.innerHTML = html;
    }

    // Delegerad klick-hantering (sätts en gång; innehållet byts ut vid render).
    idagContent.addEventListener("click", async (e) => {
      const actEl = e.target.closest("[data-act]");
      if (!actEl) return;
      switch (actEl.dataset.act) {
        case "mood":
          loadMoodForDate(todayISO());        // se till att Mående visar idag
          showView("maende", "Mående");
          break;
        case "med-today":
          await logToday();                   // använder DEFAULT_DOSE (snabbknapp)
          await renderIdag();
          break;
        case "blod":
          showView("blodningar", "Blödningar");
          break;
      }
    });

    // Bygg vyn vid start (Idag är default-aktiv vyn).
    renderIdag();

    /* ======================================================================
       d) SERVICE WORKER – registrering (offline-stöd)
          OBS: aktiveras bara i säker kontext (https eller localhost).
       =================================================================== */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(
          (reg) => console.log("Service worker registrerad:", reg.scope),
          (err) => console.warn("Service worker kunde inte registreras:", err)
        );
      });
    }

    // Öppna databasen direkt så stores skapas vid första start, och försök
    // sedan med en best-effort morgon-notis (sekundärt – se påminnelse-blocket).
    openDB()
      .then(() => maybeNotifyMorning())
      .catch((err) => console.error("Kunde inte öppna databasen:", err));
  </script>
</body>
</html>
